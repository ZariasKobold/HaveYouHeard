<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tale Not Found — HeardTale</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: #0d0d0f;
    color: #f0ede8;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
    position: relative;
    overflow: hidden;
  }
  .bg {
    position: fixed;
    inset: 0;
    background-image: url('/404_bg.png');
    background-size: cover;
    background-position: center top;
    z-index: 0;
    filter: brightness(0.35);
  }
  .content {
    position: relative;
    z-index: 1;
    max-width: 480px;
  }
  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    color: #e8c57a;
    margin-bottom: 3rem;
  }
  .headline {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    line-height: 1.3;
    color: #f0ede8;
    margin-bottom: 1rem;
    text-shadow: 0 2px 20px rgba(0,0,0,0.8);
  }
  .sub {
    font-size: 1rem;
    color: rgba(240,237,232,0.7);
    font-style: italic;
    font-family: 'Playfair Display', serif;
    margin-bottom: 2.5rem;
    line-height: 1.6;
  }
  .btn-home {
    display: inline-block;
    background: #e8c57a;
    color: #1a1508;
    padding: 12px 28px;
    border-radius: 8px;
    text-decoration: none;
    font-weight: 500;
    font-size: 14px;
  }
  .back-link {
    display: block;
    font-size: 13px;
    color: rgba(240,237,232,0.5);
    text-decoration: none;
    margin-top: 0.75rem;
  }
  .error-code {
    font-size: 10px;
    color: rgba(240,237,232,0.25);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 1.5rem;
  }
</style>
</head>
<body>
<div class="bg"></div>
<div class="content">
  <div class="logo">HeardTale</div>
  <div class="error-code">404 — Page not found</div>
  <h1 class="headline">We couldn't find this Tale…</h1>
  <p class="sub">maybe it was never written down.</p>
  <a href="/" class="btn-home">Return to HeardTale</a>
  <a href="javascript:history.back()" class="back-link">← Go back</a>
</div>
<script>
  const path = window.location.pathname;
  const search = window.location.search;
  const hash = window.location.hash;

  // Known app routes that should redirect to the SPA
  const isAppRoute =
    path === '/admin' ||
    path === '/admin/' ||
    /^\/tale\/[^\/]+\/[^\/]+\/?$/.test(path);

  if (isAppRoute) {
    // Use query parameter instead of sessionStorage — works in ALL browsers
    // including WebViews used by Telegram, Facebook, Instagram etc.
    const encoded = encodeURIComponent(path + search + hash);
    window.location.replace('/?r=' + encoded);
  }
  // All other paths stay on the 404 page
</script>
</body>
</html>
